name: Docker Build and Test

on:
  push:
    tags:
      - 'v*.*.*'
      - '*.*.*'

env:
  IMAGE_NAME: veecode/devportal

permissions:
  contents: read
  
jobs:

  validate-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Ensure tag exists in main (skip for pre-releases)
        env:
          TAG_REF: ${{ github.ref }}
        run: |
          TAG="${TAG_REF#refs/tags/}"
          echo "Pushed TAG=$TAG"
          # Pre-release tags (e.g. 2.0.0-rc1, v2.0.0-beta.1) can come from
          # feature branches — skip the main-ancestry check for those.
          if echo "$TAG" | grep -qE '[-](rc|alpha|beta|preview)'; then
            echo "OK: pre-release tag, skipping main-ancestry check."
            exit 0
          fi
          git fetch origin main
          SHA="$(git rev-parse "$TAG^{commit}")"
          if git merge-base --is-ancestor "$SHA" origin/main; then
            echo "OK: tag commit is reachable from main."
          else
            echo "ERROR: tag commit is not on main." >&2
            exit 1
          fi

  build:
    needs: validate-tag
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux/amd64
            arch: amd64
          - os: ubuntu-22.04-arm
            platform: linux/arm64
            arch: arm64
    runs-on: ${{ matrix.os }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Extract tag version
      id: extract-tag
      run: |
        TAG="${GITHUB_REF#refs/tags/}"
        echo "tag=$TAG" >> $GITHUB_OUTPUT
        echo "Extracted TAG=$TAG"

    - name: Fetch marketplace catalog entities
      run: |
        git clone --depth 1 --filter=blob:none --sparse --branch main \
          https://github.com/veecode-platform/devportal-plugin-export-overlays.git /tmp/export-overlays
        cd /tmp/export-overlays
        git sparse-checkout set catalog-entities
        rm -rf $GITHUB_WORKSPACE/catalog-entities
        cp -r catalog-entities $GITHUB_WORKSPACE/catalog-entities

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # login to Docker Hub
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
      
    - name: Build image (with cache)
      uses: docker/build-push-action@v6
      with:
        context: .
        platforms: ${{ matrix.platform }}
        push: true
        build-args: |
          DEVPORTAL_VERSION=${{ steps.extract-tag.outputs.tag }}
        tags: |
          ${{ env.IMAGE_NAME }}:${{ steps.extract-tag.outputs.tag }}-${{ matrix.arch }}

  manifest:
    needs: build
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Extract tag version
        id: extract-tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Extracted TAG=$TAG"
  
      # login to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Create multi-arch manifest (SHA tag)
        run: |
          docker buildx imagetools create -t ${{ env.IMAGE_NAME }}:${{ steps.extract-tag.outputs.tag }} \
            ${{ env.IMAGE_NAME }}:${{ steps.extract-tag.outputs.tag }}-amd64 \
            ${{ env.IMAGE_NAME }}:${{ steps.extract-tag.outputs.tag }}-arm64

      - name: Check if pre-release
        id: check-prerelease
        env:
          TAG: ${{ steps.extract-tag.outputs.tag }}
        run: |
          if echo "$TAG" | grep -qE '[-](rc|alpha|beta|preview)'; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
            echo "Pre-release detected, will NOT update :latest"
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create multi-arch manifest (latest)
        if: steps.check-prerelease.outputs.prerelease == 'false'
        run: |
          docker buildx imagetools create -t ${{ env.IMAGE_NAME }}:latest \
            ${{ env.IMAGE_NAME }}:${{ steps.extract-tag.outputs.tag }}-amd64 \
            ${{ env.IMAGE_NAME }}:${{ steps.extract-tag.outputs.tag }}-arm64
