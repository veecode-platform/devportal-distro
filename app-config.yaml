  enabled: false

extensions:
  directory: /app/catalog-entities/extensions
  installation:
    enabled: true
    saveToSingleFile:
      file: /app/extensions-install.yaml

kubernetes:
  serviceLocatorMethod:
    type: 'singleTenant'
  clusterLocatorMethods:
