#
# This is a dynamic plugins config file bundled with the devportal-base image.
# It is used to define the behaviour of the dynamic plugins system pre-startup.
#
# Plugins at "dynamic-plugins-root" will be loaded at startup, and its default 
# content is defined by the "dynamic-plugins" workspace (downloads and wrappers).
# This file defines, on the other hand, defines the plugins that will be copied 
# into the "dynamic-plugins-root" folder during startup.
#
# It is important to undertand: pre-installed plugins are bundled with the image.
# They are forcibly loaded at startup if placed in the "dynamic-plugins-root" folder.
# They are **not** forcibly loaded if kept somewhere else.
#
# This config file will enumerate plugins that:
#
# 1. Are bundled in the image file system, but outside the "dynamic-plugins-root" folder.
# 2. Are not bundled in the image, but are available for download.
#
# A start script will process this file and make sure enabled plugins are copied
# into the "dynamic-plugins-root" folder *and* that their configuration gets merged
# into a proper dedicated "app-config" file.
#
includes:
  # Always start by merging the defaults that ship inside the image
  # That makes it easy to enable plugins with defaults that would otherwise
  # be painful to configure.
  - dynamic-plugins.default.yaml
  # Plugins installed/enabled via marketplace UI
  - extensions-install.yaml

plugins:
  #- package: ./dynamic-plugins/dist/backstage-plugin-kubernetes-backend-dynamic
  #  disabled: true
  - package: ./dynamic-plugins/dist/backstage-plugin-kubernetes-dynamic
    disabled: true
  - package: ./dynamic-plugins/dist/red-hat-developer-hub-backstage-plugin-global-floating-action-button-dynamic
    disabled: true
  - package: ./dynamic-plugins/dist/roadiehq-backstage-plugin-security-insights-dynamic
    disabled: true
  - package: ./dynamic-plugins/dist/roadiehq-backstage-plugin-github-insights-dynamic
    disabled: true
  - package: ./dynamic-plugins/dist/backstage-community-plugin-github-actions-dynamic
    disabled: true
  - package: ./dynamic-plugins/dist/veecode-platform-backstage-plugin-github-workflows-backend-dynamic
    disabled: true
  - package: ./dynamic-plugins/dist/veecode-platform-backstage-plugin-github-workflows-dynamic
    disabled: true
  # azure-devops: managed via marketplace (extensions-install.yaml)
  - package: ./dynamic-plugins/dist/backstage-community-plugin-jenkins-backend-dynamic
    disabled: true
  - package: ./dynamic-plugins/dist/backstage-community-plugin-jenkins
    disabled: true
  - package: ./dynamic-plugins/dist/veecode-platform-backstage-plugin-about-backend-dynamic
    disabled: false
  - package: ./dynamic-plugins/dist/veecode-platform-backstage-plugin-about-dynamic
    disabled: false
  # ── Extensions Marketplace ──────────────────────────────────────────
  # Frontend (RHDH) — provides the /marketplace UI
  - package: oci://quay.io/veecode/extensions:bs_1.48.4!red-hat-developer-hub-backstage-plugin-extensions
    disabled: false
    pluginConfig:
      dynamicPlugins:
        frontend:
          red-hat-developer-hub.backstage-plugin-extensions:
            appIcons:
              - name: pluginsIcon
                importName: PluginsIcon
            dynamicRoutes:
              - path: /marketplace
                importName: DynamicExtensionsPluginRouter
                menuItem:
                  icon: pluginsIcon
                  text: Marketplace
            menuItems:
              marketplace:
                title: Marketplace
                icon: pluginsIcon
  # ⚠️ RHDH backend DISABLED — replaced by devportal-marketplace-backend.
  # DO NOT enable both simultaneously — they share pluginId "extensions"
  # and would conflict on /api/extensions/* routes.
  - package: oci://quay.io/veecode/extensions:bs_1.48.4!red-hat-developer-hub-backstage-plugin-extensions-backend
    disabled: true
  # DevPortal custom marketplace backend (no production block)
  - package: ./dynamic-plugins/dist/devportal-marketplace-backend-dynamic-dynamic
    disabled: false
  # Pending changes indicator (header badge next to notifications bell)
  - package: ./dynamic-plugins/dist/devportal-pending-changes-dynamic
    disabled: false
    pluginConfig:
      dynamicPlugins:
        frontend:
          devportal.pending-changes:
            mountPoints:
              - mountPoint: global.header/component
                importName: PendingChangesButton
                config:
                  priority: 55
                  props:
                    pollingIntervalMs: 30000
  # Catalog backend module — entity providers for Extension/Package/Collection kinds
  - package: oci://quay.io/veecode/extensions:bs_1.48.4!red-hat-developer-hub-backstage-plugin-catalog-backend-module-extensions
    disabled: false
